name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install
        run: npm install
      
      - name: Extract Sources
        run: npm run sources 
      
      - name: Build and Physical Path Alignment
        run: |
          # 1. 执行标准构建
          npm run build
          
          # 2. 【核心手术】不再玩相对路径，而是强行把所有绝对路径指向你的仓库名
          # 这样能解决 JS 内部动态加载产生的 404 错误
          REPO="myEvidenceFiles"
          
          # 对 HTML, JS, CSS 进行“全量路径注入”
          # 只要看到 /_app/ 或 /data/，就强制变成 /myEvidenceFiles/_app/
          find build -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i "s|/_app/|/$REPO/_app/|g" {} +
          find build -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i "s|/data/|/$REPO/data/|g" {} +
          
          # 针对 HTML 里的 src 和 href 补齐路径
          find build -type f -name "*.html" -exec sed -i "s|src=\"/|src=\"/$REPO/|g" {} +
          find build -type f -name "*.html" -exec sed -i "s|href=\"/|href=\"/$REPO/|g" {} +

          # 3. 【解决字体 404】修正 CSS 里的字体 url 引用
          find build -type f -name "*.css" -exec sed -i "s|url(/|url(/$REPO/|g" {} +

          # 4. 【关键通行证】创建 .nojekyll
          # 没有这个文件，GitHub 绝对会屏蔽 _app 文件夹（导致 404）
          touch build/.nojekyll
          
          echo "--- 物理路径补丁已注入 ---"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
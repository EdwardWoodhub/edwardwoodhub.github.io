name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install
        run: npm install
      
      - name: Extract Sources
        run: npm run sources 
      
      - name: Build with Subpath Awareness
        # 核心：通过 VITE_SVELTEKIT_BASE 告诉 SvelteKit 根目录已变
        run: npm run build
        env:
          EVIDENCE_SITE_URL: "https://edwardwoodhub.github.io/myEvidenceFiles"
          VITE_SVELTEKIT_BASE: "/myEvidenceFiles"

      - name: Physical Mirroring (挪文件夹策略)
        run: |
          # 1. 创建一个名为 dist 的新目录作为部署根目录
          # 2. 在里面建一个和你仓库名一模一样的子文件夹
          mkdir -p dist/myEvidenceFiles
          
          # 3. 将构建出来的所有文件物理搬迁到这个子文件夹里
          cp -r build/* dist/myEvidenceFiles/
          
          # 4. 创建通行证，防止 GitHub 屏蔽下划线文件夹
          touch dist/.nojekyll
          
          echo "--- 物理路径对齐完成 ---"
          ls -R dist/myEvidenceFiles | head -n 10

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist' # 关键：部署这个重新编排过的目录

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
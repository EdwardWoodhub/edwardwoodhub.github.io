name: Deploy Evidence Site

on:
  push:
    branches: [ main ]         # 1. 每次推送代码或上传数据时运行
  workflow_dispatch:           # 2. 允许在 GitHub 网页上手动点击 "Run workflow"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Extract Data Sources
        run: npm run sources 
      
      # 【核心补丁】强制注入子路径并解除 GitHub 屏蔽
      - name: Build with Subfolder Path
        run: |
          # 1. 执行构建
          npm run build
          # 2. 核心补丁：创建 .nojekyll 文件，强制 GitHub Pages 开放 _app 文件夹（解决 404）
          touch build/.nojekyll
        env:
          # 三重保险：确保 Evidence 及其底层的 SvelteKit 引擎都能识别二级目录
          EVIDENCE_SITE_URL: "https://edwardwoodhub.github.io/myEvidenceFiles"
          BASE_PATH: "/myEvidenceFiles"
          VITE_SVELTEKIT_BASE: "/myEvidenceFiles"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
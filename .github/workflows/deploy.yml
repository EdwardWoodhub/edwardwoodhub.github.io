name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install
        run: npm install
      
      - name: Extract Sources
        run: npm run sources 
      
      - name: Build and Surgical Path Fix
        run: |
          # 1. 正常执行构建
          npm run build
          
          # 2. 【核心手术】强制修正路径：将 / 替换为 /myEvidenceFiles/
          # 修正 HTML 中的资源引用
          find build -type f -name "*.html" -exec sed -i 's|src="/|src="/myEvidenceFiles/|g' {} +
          find build -type f -name "*.html" -exec sed -i 's|href="/|href="/myEvidenceFiles/|g' {} +
          
          # 修正 JS 中的动态路径引用 (处理 _app 文件夹)
          find build -type f -name "*.js" -exec sed -i 's|/_app/|/myEvidenceFiles/_app/|g' {} +
          
          # 3. 修正数据路径 (处理 /data 文件夹，解决 Loading 问题)
          find build -type f -name "*.js" -exec sed -i 's|/data/|/myEvidenceFiles/data/|g' {} +

          # 4. 解除 GitHub Pages 的下划线屏蔽 (极其重要)
          touch build/.nojekyll
          
          echo "--- 路径修正手术完成 ---"
          grep -o 'src="/myEvidenceFiles/[^"]*"' build/index.html | head -n 3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - run: npm install
      - run: npm run sources 
      
      - name: Build and Precision Path Fix
        run: |
          # 1. 执行构建
          npm run build
          
          # 2. 【核心手术】只针对特定关键词进行替换，避免“套娃”
          # 这一组命令涵盖了所有的 JS, CSS, HTML, 和 Manifest 文件
          # 我们不再匹配 src="/，而是匹配 /_app/ 这种唯一的标识符
          
          # 定义目标文件和子路径
          SUB="/myEvidenceFiles"
          FILES=$(find build -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.webmanifest" \))

          for f in $FILES; do
            # 修正 _app 路径 (所有的 JS, CSS 资源)
            sed -i "s|/_app/|$SUB/_app/|g" "$f"
            # 修正 data 路径 (所有的图表数据)
            sed -i "s|/data/|$SUB/data/|g" "$f"
            # 修正 manifest 路径
            sed -i "s|/manifest.webmanifest|$SUB/manifest.webmanifest|g" "$f"
            # 修正 favicon 路径
            sed -i "s|/favicon.ico|$SUB/favicon.ico|g" "$f"
            # 修正图片和文字链接 (匹配引号后的反斜杠)
            sed -i "s|\"/\([^/]\)|\"$SUB/\1|g" "$f"
          done

          # 3. 解决 GitHub Pages 的下划线屏蔽
          touch build/.nojekyll
          
          echo "--- 路径精准修正完成 ---"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
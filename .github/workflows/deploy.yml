name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install
        run: npm install
      
      - name: Extract Sources
        run: npm run sources 
      
      - name: Build and Surgical Path Fix
        run: |
          # 1. 正常执行构建
          npm run build
          
          # 2. 【分步精准手术】不使用变量，避免转义错误
          
          # 修正 HTML 里的资源引用
          find build -type f -name "*.html" -exec sed -i 's|src="/|src="/myEvidenceFiles/|g' {} +
          find build -type f -name "*.html" -exec sed -i 's|href="/|href="/myEvidenceFiles/|g' {} +
          
          # 修正 JS 里的动态引用（解决 404 的核心）
          find build -type f -name "*.js" -exec sed -i 's|/_app/|/myEvidenceFiles/_app/|g' {} +
          find build -type f -name "*.js" -exec sed -i 's|/data/|/myEvidenceFiles/data/|g' {} +
          
          # 修正 CSS 里的字体引用（解决 Inter 字体 404）
          find build -type f -name "*.css" -exec sed -i 's|/_app/|/myEvidenceFiles/_app/|g' {} +
          
          # 修正 Manifest 和 Favicon
          find build -type f -name "*.html" -exec sed -i 's|/manifest.webmanifest|/myEvidenceFiles/manifest.webmanifest|g' {} +
          find build -type f -name "*.html" -exec sed -i 's|/favicon.ico|/myEvidenceFiles/favicon.ico|g' {} +

          # 3. 解决 GitHub Pages 的下划线屏蔽（通行证）
          touch build/.nojekyll
          
          echo "--- 路径修正手术完成 ---"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
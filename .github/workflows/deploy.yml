name: Deploy Evidence Site

on:
  push:
    branches: [ main ]         # 1. 每次代码推送或上传 CSV 时运行
  schedule:
    - cron: '0 0 * * *'        # 2. 每天北京时间早上 8:00 自动运行
  workflow_dispatch:           # 3. 允许你在网页上手动点击 "Run workflow"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Extract Data Sources
        run: npm run sources 
      
      # 【核心补丁区】修复 404 错误和下划线文件夹屏蔽
      - name: Build and bypass Jekyll
        run: |
          npm run build
          touch build/.nojekyll
        env:
          # 告诉 Evidence 你的网页是在子路径 /myEvidenceFiles 下运行的
          EVIDENCE_SITE_URL: "https://edwardwoodhub.github.io/myEvidenceFiles"
          # 如果你的项目使用较新版本的 Evidence，可能还需要这个变量
          VITE_SVELTEKIT_ADAPTER_STATIC_FALLBACK: "404.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
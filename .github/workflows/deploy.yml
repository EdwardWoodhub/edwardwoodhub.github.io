name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install & Source
        run: |
          npm install
          npm run sources
      
      - name: Build and Relativize Paths
        run: |
          # 1. 执行标准构建
          npm run build
          
          # 2. 【核心手术】把绝对路径改为相对路径
          # 这样浏览器就会在当前目录下寻找 _app 和 data 文件夹
          find build -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i 's|src="/|src="|g' {} +
          find build -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i 's|href="/|href="|g' {} +
          
          # 特别针对 JS 内部的动态导入 (将 "/_app/" 替换为 "_app/")
          find build -type f -name "*.js" -exec sed -i 's|"/_app/|"_app/|g' {} +
          find build -type f -name "*.js" -exec sed -i 's|"/data/|"data/|g' {} +
          
          # 3. 加上通行证
          touch build/.nojekyll
          
          echo "--- 相对路径转换完成 ---"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build' # 直接上传 build 文件夹，不套娃

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
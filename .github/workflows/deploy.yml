name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - run: npm install
      - run: npm run sources 
      
      - name: Build and Mirror Structure
        run: |
          # 1. 告诉 SvelteKit 根目录是 /myEvidenceFiles
          # 2. 执行构建
          npm run build
        env:
          EVIDENCE_SITE_URL: "https://edwardwoodhub.github.io/myEvidenceFiles"
          VITE_SVELTEKIT_BASE: "/myEvidenceFiles"

      - name: Implement "Folder Move" Strategy
        run: |
          # 这一步就是你提议的：在产物里造一个同名文件夹
          # 这样当你访问 .../myEvidenceFiles/ 时，GitHub 会自动进入这个文件夹
          mkdir -p build_new/myEvidenceFiles
          cp -r build/* build_new/myEvidenceFiles/
          
          # 关键：把 .nojekyll 放在最外层，防止 GitHub 屏蔽下划线文件夹
          touch build_new/.nojekyll
          
          # 验证物理路径：你应该能看到 build_new/myEvidenceFiles/_app
          ls -R build_new/myEvidenceFiles | head -n 10

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build_new' # 部署这个重新编排过的目录

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4